<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A perfect place to call home</title>
    <!-- css script -->
     <link rel="stylesheet" href="./assets/css/style.css">
     <!-- Google fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
     <script src="https://kit.fontawesome.com/051882cf1d.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- Header -->
    <header>
        <img src="./assets/images/header.png" class="image-header" alt="">
    </header>

    <!-- Main -->
    <main>
        <section>
        <div class="main-section">
            <h1>A PERFECT PLACE TO CALL HOME</h1>
        </div>

        <div class="main-text main-section">
            <p>A Perfect Place to Call Home is Julia Nascimento’s first collection of visual narratives about her experiences and reflections of life in different places as a foreigner. </p>
        </div>

        <div class="main-section">
            <button class="read-more-button">Read som of my comic</button>
        </div>
        <div class="main-section">
        </div>
        </section>
        
        <!-- Carousel -->
        <div class="space">
            <img src="./assets/images/dotts.png" alt="Dots in a squrly line moving down" class="dotts">
        </div>

       <section>
        <div class="caroulse-container">
            <h1 class="h1-slide">Year after disaster</h1>
            <!-- images -->
            <div class="carousel-image">
                <img src="assets/images/comic1.png" alt="image 1">
                <img src="assets/images/comic2.png" alt="image 2">
            </div>
             <div class="carousel-image">
                <img src="assets/images/comic3.png" alt="image 3">
                <img src="assets/images/comic4.png" alt="image 4">
            </div>
             <div class="carousel-image">
                <img src="assets/images/comic5.png" alt="image 5">
                <img src="assets/images/comic6.png" alt="image 6">
            </div>
               <div>
            <!-- buttons from Font Awesome--> 
             <i class="fa-solid fa-circle-chevron-left" onclick="prev()"></i>
             <i class="fa-solid fa-circle-chevron-right" onclick="next()"></i>
        </div>
        </div>
     
        </section> 
        <div class="space"></div>

    </main>

    <!-- Footer -->
    <footer>
        <img src="./assets/images/footer1.png" class="image-footer" alt="">
    </footer>

    <!-- Information modul -->
   
    <!-- js script-->
     <script src="./js/app.js"></script>
     
</body>

</html>
